name: Desktop Build

# 打包桌面壳（apps/desktop）：
# - 手动触发（workflow_dispatch）：产出可下载的安装包构件，用来自测（含 Windows）。
# - 推送 desktop-v* tag：额外创建一个 GitHub Release 并附上安装包，Release 说明自动从 CHANGELOG 提取。
#   （壳与核心版本独立，见 docs/VERSIONING.md；打核心 v* 不会触发本工作流）
on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    permissions:
      contents: write # 打 tag 时创建 Release 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (Apple Silicon)
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install deps
        run: |
          npm install -g node-gyp
          pnpm install --frozen-lockfile
        env:
          npm_config_build_from_source: true
          # Windows + Node 24 下 node-gyp 并行 rebuild 会触发竞态
          # "Completion callback never invoked!" → 强制单线程规避
          npm_config_jobs: 1

      - name: Build app
        working-directory: apps/desktop
        run: pnpm tauri build

      # 自测用：无论触发方式都上传构件
      - uses: actions/upload-artifact@v5
        with:
          name: sendtomyself-${{ matrix.os }}
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      # 从 CHANGELOG 提取当前版本说明，供 Release body 用
      - name: Extract changelog
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # desktop-v1.0.0 → 1.0.0
          VER="${TAG#desktop-v}"
          # 提取 CHANGELOG 中对应版本的整段
          BODY=$(awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          # 多行输出到 GITHUB_OUTPUT
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # 打 tag 时附到 Release
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

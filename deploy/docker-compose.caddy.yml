# SendToMyself —— 一体化部署（应用 + Caddy 自动 HTTPS）
#
# 适合有公网域名、想让证书全自动的场景（VPS 或公网可达的 NAS）。
# 用法：
#   1. 把同目录的 Caddyfile 里的 stm.example.com 改成你的域名；
#   2. 本文件里改 AUTH_PASSWORD；
#   3. 确保域名解析到本机、80/443 端口可达；
#   4. docker compose -f docker-compose.caddy.yml up -d
#
# Caddy 会自动为你的域名申请并续期证书；应用不对外暴露端口，只在内部网络供 Caddy 访问。

services:
  app:
    image: ghcr.io/starfie1d1272/send-to-myself:latest
    container_name: sendtomyself
    restart: unless-stopped
    environment:
      AUTH_PASSWORD: "改成一个强口令"
      SECURE_COOKIE: "true"
      MAX_UPLOAD_BYTES: "52428800"
    volumes:
      - ./data:/data

  caddy:
    image: caddy:2
    container_name: sendtomyself-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data # 证书持久化，勿删
      - ./caddy-config:/config
